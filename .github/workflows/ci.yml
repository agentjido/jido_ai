name: CI

on:
  pull_request:
  merge_group:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read

jobs:
  ci:
    name: CI
    uses: agentjido/github-actions/.github/workflows/jido-ci.yml@v5
    secrets: inherit
    with:
      quality_otp_version: "29"
      quality_elixir_version: "1.20"
      test_matrix: '[{"otp":"27","elixir":"1.18"},{"otp":"28","elixir":"1.18"},{"otp":"28","elixir":"1.19"},{"otp":"29","elixir":"1.20"}]'
      credo_command: mix credo --min-priority high --all
      docs_command: mix docs -f html
      test_command: mix test
